apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-devops
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: backend
        imagePullPolicy: Never
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
