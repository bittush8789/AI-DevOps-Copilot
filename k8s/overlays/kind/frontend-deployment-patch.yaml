apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-devops
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: frontend
        imagePullPolicy: Never
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
