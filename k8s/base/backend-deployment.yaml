apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-devops
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: ai-devops-backend
      containers:
      - name: backend
        image: ai-devops-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: ai-devops-config
              key: aws_region
        - name: BEDROCK_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: ai-devops-config
              key: bedrock_model_id
        - name: VECTOR_DB_TYPE
          valueFrom:
            configMapKeyRef:
              name: ai-devops-config
              key: vector_db_type
        - name: AWS_BEARER_TOKEN_BEDROCK
          valueFrom:
            secretKeyRef:
              name: bedrock-credentials
              key: api_key
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access_key_id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret_access_key
              optional: true
        - name: OPENSEARCH_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ai-devops-config
              key: opensearch_endpoint
              optional: true
        - name: OPENSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: opensearch-credentials
              key: username
              optional: true
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opensearch-credentials
              key: password
              optional: true
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: pinecone-credentials
              key: api_key
              optional: true
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /api/v1/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
